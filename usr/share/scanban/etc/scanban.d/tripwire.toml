# Setup iptables tripwires so scanban can catch worms probing specific ports
# (e.g. EternalBlue on 445, telnet on 23). Add the LOG rules first:
#
#   iptables -A INPUT -i tun0 -p tcp --dport 445 -j LOG --log-prefix "tripwire "
#   iptables -A INPUT -i tun0 -p tcp --dport 138 -j LOG --log-prefix "tripwire "

[rules.tripwire]
# Ban any IP that hits a tripwire port. Narrow to specific ports by replacing
# the pattern below with e.g. "tripwire .* DPT=445 ".
patterns = ["tripwire "]
ip_regex = 'SRC=(\d+\.\d+\.\d+\.\d+)'

[[files]]
path = "/var/log/kern.log"
rules = ["tripwire"]
