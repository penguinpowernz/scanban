# Ban IPs that probe a Rails app for PHP scripts, admin panels, and common
# exploit paths — things a Rails app should never serve.

[rules.php_probe]
patterns = [
  '\.php" for',
  '\.pl" for',
  '\.aspx" for',
  '\.cgi" for',
  "XDEBUG_SESSION_START=phpstorm",
  "/cgi-bin/",
  "/phpMyAdmin/",
  "/webfig/",
  "/wp-admin/",
  "/wp-includes/",
  "/wordpress",
  "/boaform/",
  "/kube-system/daemonsets/",
  '/autodiscover/autodiscover\.json\?@zdi/Powershell',
  "/api/sonicos/auth",
  "/dana-na/",
  '/\.git/',
  '/\.env" for',
]

[[files]]
path = "/opt/railsapp/log/production.log"
ip_regex = 'for (\d+\.\d+\.\d+\.\d+) at'
rules = ["php_probe"]
