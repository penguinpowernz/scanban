#dry_run = true
#verbose = true
#include = /etc/scanban.d
#do_bans = true
#do_unbans = true
#byo_tcp = "127.0.0.1:7733"
#byo_uds = "/var/run/scanban.socket

whitelist = [
  "127.0.0.1",

  # if you're using docker this ensures that docker's gateway doesn't get blocked
  #"172.17.0.0/16",
  #"172.18.0.0/16",
  #"172.19.0.0/16",
  #"172.20.0.0/16",
]

bantime = 24 # hours

[actions]
ipsetblock = "ipset add scanban $ip"
ipsetunblock = "ipset del scanban $ip"
#slackalert = "/usr/bin/slackalert '$desc $ip'"

# Define named rules, then attach them to files below.
# Rules inherit global settings (bantime, ip_regex, action, etc.) for any
# fields left unset. Per-file settings override globals; per-rule settings
# override per-file settings.

# [rules.my_rule]
# patterns = ["pattern one", "pattern two"]
# ip_regex = '(\d+\.\d+\.\d+\.\d+)'   # optional override
# action = "ipsetblock"                  # optional override
# threshold = 3                          # optional override
# bantime = 24                           # optional override

